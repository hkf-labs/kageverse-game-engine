<div id="auth-container" style="
    width: 320px;
    max-width: 96vw;
    background: rgba(10, 10, 10, 0.9);
    border: 2px solid #555;
    padding: 20px;
    border-radius: 8px;
    color: white;
    font-family: 'Press Start 2P', monospace, sans-serif;
    box-shadow: 0 0 10px rgba(0,0,0,0.5);
    box-sizing: border-box;
">
    <div id="login-view">
        <h2 data-i18n="auth.login.title" style="text-align: center; font-size: 16px; margin-bottom: 20px;">CỔNG HỌC VIỆN</h2>
        <input type="text" name="identifier" data-i18n="auth.login.identifier_placeholder" data-i18n-attr="placeholder" placeholder="Username hoặc Email" style="width: 100%; padding: 10px; margin-bottom: 10px; background: #222; border: 1px solid #444; color: white; box-sizing: border-box;" />
        <input type="password" name="password" data-i18n="auth.login.password_placeholder" data-i18n-attr="placeholder" placeholder="Mật khẩu" style="width: 100%; padding: 10px; margin-bottom: 20px; background: #222; border: 1px solid #444; color: white; box-sizing: border-box;" />
        <button id="btn-login" data-i18n="auth.login.submit" style="width: 100%; padding: 10px; background: #4caf50; color: white; border: none; cursor: pointer; font-weight: bold; margin-bottom: 10px;">VÀO GAME</button>
        <div data-i18n="auth.login.switch_to_register" style="text-align: center; font-size: 12px; cursor: pointer; color: #888;" id="switch-to-register">Tập sự mới? Đăng ký.</div>
    </div>

    <div id="register-view" style="display: none;">
        <h2 data-i18n="auth.register.title" style="text-align: center; font-size: 16px; margin-bottom: 20px;">NHẬP HỌC</h2>
        <input type="text" name="reg-username" data-i18n="auth.register.username_placeholder" data-i18n-attr="placeholder" placeholder="Username" style="width: 100%; padding: 10px; margin-bottom: 10px; background: #222; border: 1px solid #444; color: white; box-sizing: border-box;" />
        <input type="email" name="reg-email" data-i18n="auth.register.email_placeholder" data-i18n-attr="placeholder" placeholder="Email" style="width: 100%; padding: 10px; margin-bottom: 10px; background: #222; border: 1px solid #444; color: white; box-sizing: border-box;" />
        <input type="password" name="reg-password" data-i18n="auth.register.password_placeholder" data-i18n-attr="placeholder" placeholder="Mật khẩu (tối thiểu 6)" style="width: 100%; padding: 10px; margin-bottom: 10px; background: #222; border: 1px solid #444; color: white; box-sizing: border-box;" />
        <label data-i18n="auth.register.country_label" style="display:block; font-size: 10px; margin-bottom: 4px; color:#bbb;">Quốc gia (server gán ngôn ngữ)</label>
        <select name="reg-country-code" id="reg-country-code" style="width: 100%; padding: 10px; margin-bottom: 16px; background: #222; border: 1px solid #444; color: white; box-sizing: border-box;">
            <option value="" data-i18n="auth.register.country_loading">Đang tải...</option>
        </select>
        <button id="btn-register" data-i18n="auth.register.submit" style="width: 100%; padding: 10px; background: #2196f3; color: white; border: none; cursor: pointer; font-weight: bold; margin-bottom: 10px;">ĐĂNG KÝ</button>
        <div data-i18n="auth.register.switch_to_login" style="text-align: center; font-size: 12px; cursor: pointer; color: #888;" id="switch-to-login">Đã có tài khoản? Quay lại cổng.</div>
    </div>
</div>
